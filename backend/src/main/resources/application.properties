spring.application.name=library
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/library_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# App Properties mapping to .env
app.storage.books=${APP_STORAGE_BOOKS:storage/books}
app.storage.thumbnails=${APP_STORAGE_THUMBNAILS:storage/thumbnails}
app.storage.indexes=${APP_STORAGE_INDEXES:storage/indexes}
app.virus-scan.enabled=${APP_VIRUS_SCAN_ENABLED:false}
app.virus-scan.host=${APP_VIRUS_SCAN_HOST:localhost}
app.virus-scan.port=${APP_VIRUS_SCAN_PORT:3310}

app.jwt.secret=${APP_JWT_SECRET:defaultSecretKeyThatIsAtLeast32BytesLongForHS256Algorithm12345}
app.jwt.access-token-expiration-ms=${APP_JWT_ACCESS_EXP:3600000}
app.jwt.refresh-token-expiration-ms=${APP_JWT_REFRESH_EXP:86400000}

spring.jpa.properties.hibernate.search.backend.type=elasticsearch
spring.jpa.properties.hibernate.search.backend.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
spring.jpa.properties.hibernate.search.schema_management.strategy=drop-and-create

# File Upload Limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Logging Configuration
logging.level.root=${APP_LOGGING_LEVEL_ROOT:INFO}
logging.level.com.template.project=${APP_LOGGING_LEVEL_APP:DEBUG}
logging.level.org.hibernate.search=${APP_LOGGING_LEVEL_SEARCH:INFO}
logging.level.org.hibernate.search.backend.elasticsearch.request=${APP_LOGGING_LEVEL_SEARCH_REQUESTS:DEBUG}
logging.level.org.hibernate.search.backend.elasticsearch.client.rest.request=${APP_LOGGING_LEVEL_SEARCH_REQUESTS:DEBUG}
logging.level.org.elasticsearch.client=${APP_LOGGING_LEVEL_ELASTICSEARCH:INFO}
spring.jpa.properties.hibernate.default_batch_fetch_size=50
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
