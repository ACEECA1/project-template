<!DOCTYPE html>
<html lang="en">
  <head>
    <script>window.global = window;</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <meta name="description" content="Provides a unified green-themed interface integrating the official Ministry of Defense Algeria logo to deliver a cohesive and professional user experience." />
    <meta name="robots" content="noindex, nofollow" />
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    
  </head>

  <body>
    <div id="root"></div>
    <div id="error-log" style="color:red; white-space:pre-wrap; padding: 20px; font-family: monospace;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-log').textContent += e.message + '\n' + (e.error ? e.error.stack : '') + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-log').textContent += e.reason + '\n' + (e.reason ? e.reason.stack : '') + '\n\n';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
    
  </body>
</html>
